<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinu Kondayil</title>
  <meta name="description" content="Sinu Kondayil — Kochi, Kerala">

  <link rel="icon" href="assets/img/favicon.png">
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07070f;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    /* ── Custom cursor ── */
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #a855f7;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: screen;
    }

    .cursor-trail {
      position: fixed;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(168,85,247,0.4);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease, top 0.12s ease, width 0.3s, height 0.3s, opacity 0.3s;
    }

    body:has(a:hover) .cursor { width: 16px; height: 16px; background: #c084fc; }
    body:has(a:hover) .cursor-trail { width: 50px; height: 50px; opacity: 0.5; }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-img {
      position: absolute;
      inset: 0;
      background: url('assets/img/hero-bg-1.JPG') center/cover no-repeat;
      opacity: 0.07;
      filter: grayscale(40%);
      transform: scale(1.05);
      animation: bgDrift 20s ease-in-out infinite alternate;
    }

    @keyframes bgDrift {
      from { transform: scale(1.05) translate(0, 0); }
      to   { transform: scale(1.05) translate(-1%, -1%); }
    }

    .bg-orb-1 {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: rgba(124,58,237,0.12);
      filter: blur(100px);
      top: -200px; right: -150px;
      animation: orbFloat1 12s ease-in-out infinite;
    }

    .bg-orb-2 {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(20,184,166,0.08);
      filter: blur(100px);
      bottom: -100px; left: -100px;
      animation: orbFloat2 15s ease-in-out infinite;
    }

    .bg-orb-3 {
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(168,85,247,0.07);
      filter: blur(80px);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: orbFloat3 18s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(-30px, 20px) scale(1.05); }
      66%       { transform: translate(20px, -30px) scale(0.95); }
    }
    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%       { transform: translate(30px, -20px) scale(1.08); }
      70%       { transform: translate(-20px, 30px) scale(0.95); }
    }
    @keyframes orbFloat3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%       { transform: translate(-50%, -50%) scale(1.3); opacity: 0.5; }
    }

    .bg-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── Grid lines ── */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(168,85,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPan 40s linear infinite;
    }
    @keyframes gridPan {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 2rem;
      animation: avatarReveal 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes avatarReveal {
      from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .avatar {
      width: 116px;
      height: 116px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: grayscale(10%);
      border: 2px solid rgba(255,255,255,0.1);
      animation: avatarFloat 6s ease-in-out infinite;
      transition: filter 0.4s, transform 0.4s;
    }

    .avatar:hover {
      filter: grayscale(0%) brightness(1.05);
      transform: scale(1.04);
    }

    @keyframes avatarFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    /* spinning dashed ring */
    .avatar-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1.5px dashed rgba(168,85,247,0.3);
      animation: ringRotate 12s linear infinite;
      pointer-events: none;
    }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* counter-spinning solid arc */
    .avatar-ring-2 {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: rgba(20,184,166,0.4);
      border-right-color: rgba(20,184,166,0.15);
      animation: ringRotate2 8s linear infinite;
      pointer-events: none;
    }

    @keyframes ringRotate2 {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    .avatar-glow {
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.25), transparent 70%);
      animation: glowPulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1; transform: scale(1.15); }
    }

    /* ── Name ── */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1;
      margin-bottom: 0.6rem;
      overflow: hidden;
    }

    .name-char {
      display: inline-block;
      opacity: 0;
      transform: translateY(100%);
      animation: charReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .name-space { display: inline-block; width: 0.3em; }

    @keyframes charReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* shimmer sweep on name */
    h1::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: shimmer 4s ease-in-out 1.5s infinite;
      pointer-events: none;
    }

    h1 { position: relative; }

    @keyframes shimmer {
      0%   { left: -60%; }
      100% { left: 160%; }
    }

    /* ── Tag line ── */
    .tagline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease 0.95s forwards;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .tagline-item {
      color: #94a3b8;
      transition: color 0.2s;
    }

    .tagline-item:hover { color: #c084fc; }

    .tagline-sep {
      color: rgba(168,85,247,0.4);
      font-size: 0.6rem;
    }

    /* ── Location ── */
    .location {
      font-size: 0.85rem;
      color: #64748b;
      letter-spacing: 0.04em;
      margin-bottom: 2.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease 1.1s forwards;
    }

    .location-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #14b8a6;
      box-shadow: 0 0 6px rgba(20,184,166,0.8);
      animation: locPulse 2.5s ease-in-out infinite;
    }

    @keyframes locPulse {
      0%, 100% { box-shadow: 0 0 4px rgba(20,184,166,0.6); transform: scale(1); }
      50%       { box-shadow: 0 0 12px rgba(20,184,166,1); transform: scale(1.4); }
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      width: 0;
      background: linear-gradient(90deg, transparent, rgba(168,85,247,0.5), transparent);
      margin: 0 auto 2.25rem;
      animation: dividerGrow 0.8s ease 1.3s forwards;
    }

    @keyframes dividerGrow {
      to { width: 50px; }
    }

    /* ── Contact ── */
    .contact {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2.25rem;
    }

    .contact a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      opacity: 0;
      position: relative;
      display: inline-block;
      transition: color 0.25s;
    }

    .contact a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #a855f7, transparent);
      transform: translateX(-50%);
      transition: width 0.3s ease;
    }

    .contact a:hover { color: #f1f5f9; }
    .contact a:hover::after { width: 100%; }

    .contact a:nth-child(1) { animation: fadeSlideUp 0.5s ease 1.4s forwards; }
    .contact a:nth-child(2) { animation: fadeSlideUp 0.5s ease 1.55s forwards; }

    /* ── Socials ── */
    .socials {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
    }

    .social {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(18,18,30,0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      text-decoration: none;
      opacity: 0;
      transform: translateY(12px) scale(0.85);
      transition: color 0.25s, border-color 0.25s, background 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    /* ripple layer */
    .social::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: radial-gradient(circle at center, rgba(168,85,247,0.25) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .social:hover {
      color: #c084fc;
      border-color: rgba(168,85,247,0.4);
      background: rgba(124,58,237,0.15);
      box-shadow: 0 0 20px rgba(124,58,237,0.25), 0 4px 16px rgba(0,0,0,0.3);
    }

    .social:hover::before { opacity: 1; }

    .social:nth-child(1) { animation: socialPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.65s forwards; }
    .social:nth-child(2) { animation: socialPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.75s forwards; }
    .social:nth-child(3) { animation: socialPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.85s forwards; }
    .social:nth-child(4) { animation: socialPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.95s forwards; }
    .social:nth-child(5) { animation: socialPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 2.05s forwards; }

    @keyframes socialPop {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Shared helpers ── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  <script>
    // ── Staggered name character reveal ──
    const name = 'Sinu Kondayil';
    const nameEl = document.getElementById('nameEl');
    let delay = 0.3;
    name.split('').forEach(ch => {
      if (ch === ' ') {
        nameEl.appendChild(Object.assign(document.createElement('span'), { className: 'name-space' }));
      } else {
        const s = document.createElement('span');
        s.className = 'name-char';
        s.textContent = ch;
        s.style.animationDelay = `${delay}s`;
        nameEl.appendChild(s);
        delay += 0.055;
      }
    });

    // ── Custom cursor ──
    const cursor = document.getElementById('cursor');
    const trail  = document.getElementById('cursorTrail');
    let mx = 0, my = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });

    // Trail follows with slight lag
    let tx = 0, ty = 0;
    (function animTrail() {
      tx += (mx - tx) * 0.12;
      ty += (my - ty) * 0.12;
      trail.style.left = tx + 'px';
      trail.style.top  = ty + 'px';
      requestAnimationFrame(animTrail);
    })();

    // ── Mouse parallax on orbs ──
    const orb1 = document.getElementById('orb1');
    const orb2 = document.getElementById('orb2');

    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      orb1.style.transform = `translate(${dx * -25}px, ${dy * -25}px)`;
      orb2.style.transform = `translate(${dx * 20}px,  ${dy * 20}px)`;
    });

    // ── Card 3D tilt on mouse move ──
    const card   = document.getElementById('card');
    const avatar = document.getElementById('avatar');

    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const rx = ((e.clientY - cy) / cy) * -6;
      const ry = ((e.clientX - cx) / cx) *  6;
      card.style.transform  = `perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg)`;
      // avatar moves slightly opposite for depth
      avatar.style.transform = `translateY(calc(var(--float, 0px))) translate(${-ry * 0.5}px, ${-rx * 0.5}px)`;
    });

    document.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
    });

    // ── Social magnetic hover ──
    document.querySelectorAll('.social').forEach(el => {
      el.addEventListener('mousemove', e => {
        const r   = el.getBoundingClientRect();
        const dx  = e.clientX - (r.left + r.width  / 2);
        const dy  = e.clientY - (r.top  + r.height / 2);
        el.style.transform = `translate(${dx * 0.25}px, ${dy * 0.25}px) scale(1.15)`;
      });
      el.addEventListener('mouseleave', () => {
        el.style.transform = '';
      });
    });
  </script>

</body>
</html>
