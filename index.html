<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinu Kondayil</title>
  <meta name="description" content="Sinu Kondayil — Kochi, Kerala">

  <link rel="icon" href="assets/img/favicon.png">
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07070f;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Background layers ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-img {
      position: absolute;
      inset: 0;
      background: url('assets/img/hero-bg-1.JPG') center/cover no-repeat;
      opacity: 0.07;
      filter: grayscale(40%);
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 65% 40%, rgba(124,58,237,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 20% 70%, rgba(20,184,166,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 80% 85%, rgba(168,85,247,0.1) 0%, transparent 55%);
    }

    .bg-orb-1 {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: rgba(124,58,237,0.1);
      filter: blur(100px);
      top: -200px; right: -150px;
      pointer-events: none;
    }

    .bg-orb-2 {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(20,184,166,0.07);
      filter: blur(100px);
      bottom: -100px; left: -100px;
      pointer-events: none;
    }

    .bg-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 2rem;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top;
      display: block;
      filter: grayscale(15%);
      border: 2px solid rgba(255,255,255,0.08);
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(168,85,247,0.25);
      pointer-events: none;
    }

    .avatar-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.2), transparent 70%);
      pointer-events: none;
    }

    /* ── Name ── */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1;
      margin-bottom: 0.6rem;
    }

    /* ── Location ── */
    .location {
      font-size: 0.85rem;
      color: #64748b;
      letter-spacing: 0.04em;
      margin-bottom: 2.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .location-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #14b8a6;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Divider ── */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(168,85,247,0.4), transparent);
      margin: 0 auto 2.25rem;
    }

    /* ── Contact ── */
    .contact {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2.25rem;
    }

    .contact a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }

    .contact a:hover { color: #f1f5f9; }

    /* ── Socials ── */
    .socials {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
    }

    .social {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(18,18,30,0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s;
    }

    .social:hover {
      color: #c084fc;
      border-color: rgba(168,85,247,0.35);
      background: rgba(124,58,237,0.12);
      transform: translateY(-2px);
    }
  </style>
</head>
