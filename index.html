<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinu Kondayil</title>
  <meta name="description" content="Sinu Kondayil — Kochi, Kerala">

  <link rel="icon" href="assets/img/favicon.png">
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07070f;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    /* ── Custom cursor ── */
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #a855f7;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: screen;
    }

    .cursor-trail {
      position: fixed;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(168,85,247,0.4);
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease, top 0.12s ease, width 0.3s, height 0.3s, opacity 0.3s;
    }

    body:has(a:hover) .cursor { width: 16px; height: 16px; background: #c084fc; }
    body:has(a:hover) .cursor-trail { width: 50px; height: 50px; opacity: 0.5; }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-img {
      position: absolute;
      inset: 0;
      background: url('assets/img/hero-bg-1.JPG') center/cover no-repeat;
      opacity: 0.07;
      filter: grayscale(40%);
      transform: scale(1.05);
      animation: bgDrift 20s ease-in-out infinite alternate;
    }

    @keyframes bgDrift {
      from { transform: scale(1.05) translate(0, 0); }
      to   { transform: scale(1.05) translate(-1%, -1%); }
    }

    .bg-orb-1 {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: rgba(124,58,237,0.12);
      filter: blur(100px);
      top: -200px; right: -150px;
      animation: orbFloat1 12s ease-in-out infinite;
    }

    .bg-orb-2 {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(20,184,166,0.08);
      filter: blur(100px);
      bottom: -100px; left: -100px;
      animation: orbFloat2 15s ease-in-out infinite;
    }

    .bg-orb-3 {
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(168,85,247,0.07);
      filter: blur(80px);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: orbFloat3 18s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(-30px, 20px) scale(1.05); }
      66%       { transform: translate(20px, -30px) scale(0.95); }
    }
    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%       { transform: translate(30px, -20px) scale(1.08); }
      70%       { transform: translate(-20px, 30px) scale(0.95); }
    }
    @keyframes orbFloat3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%       { transform: translate(-50%, -50%) scale(1.3); opacity: 0.5; }
    }

    .bg-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
    }

    /* ── Grid lines ── */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(168,85,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPan 40s linear infinite;
    }
    @keyframes gridPan {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: min(460px, 92vw);
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 2rem;
      animation: avatarReveal 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes avatarReveal {
      from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .avatar {
      width: 116px;
      height: 116px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: grayscale(10%);
      border: 2px solid rgba(255,255,255,0.1);
      animation: avatarFloat 6s ease-in-out infinite;
      transition: filter 0.4s, transform 0.4s;
    }

    .avatar:hover {
      filter: grayscale(0%) brightness(1.05);
      transform: scale(1.04);
    }

    @keyframes avatarFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    /* spinning dashed ring */
    .avatar-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1.5px dashed rgba(168,85,247,0.3);
      animation: ringRotate 12s linear infinite;
      pointer-events: none;
    }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* counter-spinning solid arc */
    .avatar-ring-2 {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-top-color: rgba(20,184,166,0.4);
      border-right-color: rgba(20,184,166,0.15);
      animation: ringRotate2 8s linear infinite;
      pointer-events: none;
    }

    @keyframes ringRotate2 {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    .avatar-glow {
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.25), transparent 70%);
      animation: glowPulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1; transform: scale(1.15); }
    }

    /* ── Name ── */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 1;
      margin-bottom: 0.6rem;
      overflow: hidden;
    }

    .name-char {
      display: inline-block;
      opacity: 0;
      transform: translateY(100%);
      animation: charReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .name-space { display: inline-block; width: 0.3em; }

    @keyframes charReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* shimmer sweep on name */
    h1::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: shimmer 4s ease-in-out 1.5s infinite;
      pointer-events: none;
    }

    h1 { position: relative; }

    @keyframes shimmer {
      0%   { left: -60%; }
      100% { left: 160%; }
    }

    /* ── Tag line ── */
    .tagline {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease 0.95s forwards;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .tagline-item {
      color: #94a3b8;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.32rem;
      white-space: nowrap;
    }

    .tagline-item svg {
      width: 13px; height: 13px;
      opacity: 0.85;
      flex-shrink: 0;
    }

    .tagline-item:hover { color: #c084fc; }

    .tagline-sep {
      color: rgba(168,85,247,0.4);
      font-size: 0.6rem;
    }

    /* ── Location ── */
    .location {
      font-size: 0.85rem;
      color: #64748b;
      letter-spacing: 0.04em;
      margin-bottom: 2.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease 1.1s forwards;
    }

    .location-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #14b8a6;
      box-shadow: 0 0 6px rgba(20,184,166,0.8);
      animation: locPulse 2.5s ease-in-out infinite;
    }

    @keyframes locPulse {
      0%, 100% { box-shadow: 0 0 4px rgba(20,184,166,0.6); transform: scale(1); }
      50%       { box-shadow: 0 0 12px rgba(20,184,166,1); transform: scale(1.4); }
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      width: 0;
      background: linear-gradient(90deg, transparent, rgba(168,85,247,0.5), transparent);
      margin: 0 auto 2.25rem;
      animation: dividerGrow 0.8s ease 1.3s forwards;
    }

    @keyframes dividerGrow {
      to { width: 50px; }
    }

    /* ── Contact ── */
    .contact {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2.25rem;
    }

    .contact a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      opacity: 0;
      position: relative;
      display: inline-block;
      transition: color 0.25s;
    }

    .contact a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #a855f7, transparent);
      transform: translateX(-50%);
      transition: width 0.3s ease;
    }

    .contact a:hover { color: #f1f5f9; }
    .contact a:hover::after { width: 100%; }

    .contact a:nth-child(1) { animation: fadeSlideUp 0.5s ease 1.4s forwards; }
    .contact a:nth-child(2) { animation: fadeSlideUp 0.5s ease 1.55s forwards; }
    .contact a:nth-child(3) { animation: fadeSlideUp 0.5s ease 1.7s forwards; }

    .contact a.contact-company:hover { color: #2dd4bf; }
    .contact a.contact-company:hover::after { background: linear-gradient(90deg, transparent, #2dd4bf, transparent); }

    /* ── Socials ── */
    .socials {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
    }

    .social {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(18,18,30,0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      text-decoration: none;
      opacity: 0;
      transform: translateY(12px) scale(0.85);
      transition: color 0.25s, border-color 0.25s, background 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    /* ripple layer */
    .social::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: radial-gradient(circle at center, rgba(168,85,247,0.25) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .social:hover {
      color: #c084fc;
      border-color: rgba(168,85,247,0.4);
      background: rgba(124,58,237,0.15);
      box-shadow: 0 0 20px rgba(124,58,237,0.25), 0 4px 16px rgba(0,0,0,0.3);
    }

    .social:hover::before { opacity: 1; }

    /* auto-cycling spotlight — only one lit at a time */
    .social.glow {
      color: #c084fc;
      border-color: rgba(168,85,247,0.4);
      background: rgba(124,58,237,0.15);
      box-shadow: 0 0 20px rgba(124,58,237,0.3), 0 4px 16px rgba(0,0,0,0.3);
    }
    .social.glow::before { opacity: 1; }

    .socials-pidiga .social.glow {
      color: #2dd4bf;
      border-color: rgba(45,212,191,0.45);
      background: rgba(13,148,136,0.16);
      box-shadow: 0 0 20px rgba(20,184,166,0.32), 0 4px 16px rgba(0,0,0,0.3);
    }

    .social:nth-child(1) { animation: socialPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.65s forwards; }
    .social:nth-child(2) { animation: socialPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.75s forwards; }
    .social:nth-child(3) { animation: socialPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.85s forwards; }
    .social:nth-child(4) { animation: socialPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1.95s forwards; }
    .social:nth-child(5) { animation: socialPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 2.05s forwards; }

    @keyframes socialPop {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Pidiga badge ── */
    .pidiga-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      padding: 0.42rem 0.95rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #e9d5ff;
      text-decoration: none;
      background: linear-gradient(110deg, rgba(124,58,237,0.18), rgba(20,184,166,0.15));
      border: 1px solid rgba(168,85,247,0.35);
      box-shadow: 0 0 18px rgba(124,58,237,0.18);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease 1.2s forwards;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
    }

    .pidiga-badge strong {
      font-weight: 700;
      background: linear-gradient(90deg, #c084fc, #2dd4bf);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .pidiga-badge:hover {
      border-color: rgba(45,212,191,0.55);
      box-shadow: 0 0 26px rgba(124,58,237,0.38);
      transform: translateY(-1px);
    }

    .pidiga-spark {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2dd4bf;
      box-shadow: 0 0 8px rgba(45,212,191,0.9);
      animation: locPulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* shimmer sweep */
    .pidiga-badge::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,0.13) 50%, transparent 65%);
      transform: translateX(-130%);
      animation: shimmer 4s ease-in-out 2.4s infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      0%        { transform: translateX(-130%); }
      45%, 100% { transform: translateX(130%); }
    }

    /* ── Social groups (personal + company co-exist) ── */
    .socials-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .social-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .social-label {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #64748b;
      opacity: 0;
      animation: fadeSlideUp 0.5s ease 1.6s forwards;
    }

    .social-label-pidiga {
      color: #5eead4;
      text-shadow: 0 0 10px rgba(45,212,191,0.35);
    }

    .social-divider {
      width: 1px;
      align-self: stretch;
      margin-bottom: 8px;
      background: linear-gradient(180deg, transparent, rgba(168,85,247,0.35), transparent);
      opacity: 0;
      animation: fadeSlideUp 0.6s ease 1.7s forwards;
    }

    /* Pidiga icons get a teal brand accent on hover */
    .socials-pidiga .social:hover {
      color: #2dd4bf;
      border-color: rgba(45,212,191,0.45);
      background: rgba(13,148,136,0.16);
      box-shadow: 0 0 20px rgba(20,184,166,0.28), 0 4px 16px rgba(0,0,0,0.3);
    }

    .socials-pidiga .social::before {
      background: radial-gradient(circle at center, rgba(45,212,191,0.25) 0%, transparent 70%);
    }

    @media (max-width: 360px) {
      .social-divider { display: none; }
    }

    /* ── Blog panel (large screens only) ── */
    .blog-panel {
      display: none;
    }

    @media (min-width: 1180px) {
      .blog-panel {
        position: fixed;
        top: 50%;
        right: 3.5vw;
        transform: translateY(-50%);
        z-index: 2;
        width: 270px;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
      }
    }

    .blog-head {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 0.3rem;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease 2.2s forwards;
    }

    .blog-bar {
      width: 18px; height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, #a855f7, #2dd4bf);
    }

    .blog-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #64748b;
    }

    .blog-list {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .blog-item {
      position: relative;
      display: block;
      padding: 0.7rem 0.85rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(18,18,30,0.55);
      backdrop-filter: blur(8px);
      text-decoration: none;
      overflow: hidden;
      opacity: 0;
      transform: translateX(40px);
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s, transform 0.3s;
    }

    .blog-item.in {
      animation: blogSlideIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes blogSlideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    /* left accent rail */
    .blog-item::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      width: 2px; height: 0;
      border-radius: 2px;
      background: linear-gradient(180deg, #a855f7, #2dd4bf);
      transform: translateY(-50%);
      transition: height 0.3s ease;
    }

    .blog-item:hover {
      transform: translateX(-6px);
      border-color: rgba(168,85,247,0.4);
      background: rgba(124,58,237,0.12);
      box-shadow: 0 0 22px rgba(124,58,237,0.22), 0 6px 18px rgba(0,0,0,0.35);
    }

    .blog-item:hover::before { height: 60%; }

    .blog-meta {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.35rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.56rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .blog-tag { color: #c084fc; }
    .blog-tag.teal { color: #2dd4bf; }

    .blog-read { color: #475569; }

    .blog-name {
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.35;
      color: #cbd5e1;
      letter-spacing: 0.01em;
      transition: color 0.25s;
    }

    .blog-item:hover .blog-name { color: #f1f5f9; }

    /* auto spotlight — matches social cycle */
    .blog-item.glow {
      border-color: rgba(168,85,247,0.35);
      background: rgba(124,58,237,0.1);
      box-shadow: 0 0 18px rgba(124,58,237,0.18);
    }
    .blog-item.glow::before { height: 55%; }

    /* ── Mobile writing drawer ── */
    .blog-toggle {
      position: fixed;
      top: 1.1rem; right: 1.1rem;
      z-index: 40;
      width: 44px; height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(18,18,30,0.6);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: none;
      opacity: 0;
      animation: fadeSlideUp 0.5s ease 2.2s forwards;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    .blog-toggle:hover {
      border-color: rgba(168,85,247,0.4);
      box-shadow: 0 0 18px rgba(124,58,237,0.25);
    }

    @media (max-width: 1179px) {
      .blog-toggle { display: flex; }
    }

    .bt-lines { position: relative; width: 18px; height: 12px; }
    .bt-lines span {
      position: absolute; left: 0;
      width: 100%; height: 2px;
      border-radius: 2px;
      background: #c084fc;
      transition: transform 0.3s ease, opacity 0.2s ease, top 0.3s ease;
    }
    .bt-lines span:nth-child(1) { top: 0; }
    .bt-lines span:nth-child(2) { top: 5px; }
    .bt-lines span:nth-child(3) { top: 10px; }

    .blog-toggle.open .bt-lines span:nth-child(1) { top: 5px; transform: rotate(45deg); }
    .blog-toggle.open .bt-lines span:nth-child(2) { opacity: 0; }
    .blog-toggle.open .bt-lines span:nth-child(3) { top: 5px; transform: rotate(-45deg); }

    .blog-overlay {
      position: fixed;
      inset: 0;
      z-index: 35;
      background: rgba(5,5,12,0.6);
      backdrop-filter: blur(3px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .blog-overlay.open { opacity: 1; pointer-events: auto; }

    .blog-drawer {
      position: fixed;
      top: 0; right: 0;
      z-index: 36;
      height: 100%;
      width: min(320px, 84vw);
      padding: 4.5rem 1.3rem 1.5rem;
      background: rgba(12,12,22,0.92);
      backdrop-filter: blur(14px);
      border-left: 1px solid rgba(168,85,247,0.18);
      box-shadow: -20px 0 60px rgba(0,0,0,0.5);
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .blog-drawer.open { transform: translateX(0); }

    .drawer-head {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 0.4rem;
    }
    .drawer-head .blog-bar { width: 18px; height: 2px; border-radius: 2px; background: linear-gradient(90deg, #a855f7, #2dd4bf); }
    .drawer-head .blog-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.62rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: #94a3b8;
    }

    /* drawer items: always visible, no entrance offset */
    #blogListMobile { display: flex; flex-direction: column; gap: 0.6rem; }
    #blogListMobile .blog-item { opacity: 1; transform: none; }
    #blogListMobile .blog-item:hover { transform: translateX(-4px); }

    /* ── Small screens ── */
    @media (max-width: 480px) {
      .card { padding: 2.6rem 1.4rem; }
      .tagline { font-size: 0.66rem; gap: 0.4rem; }
      .tagline-item { gap: 0.28rem; }
      .tagline-item svg { width: 12px; height: 12px; }
    }

    /* ── Shared helpers ── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  <script>
    // ── Staggered name character reveal ──
    const name = 'Sinu Kondayil';
    const nameEl = document.getElementById('nameEl');
    let delay = 0.3;
    name.split('').forEach(ch => {
      if (ch === ' ') {
        nameEl.appendChild(Object.assign(document.createElement('span'), { className: 'name-space' }));
      } else {
        const s = document.createElement('span');
        s.className = 'name-char';
        s.textContent = ch;
        s.style.animationDelay = `${delay}s`;
        nameEl.appendChild(s);
        delay += 0.055;
      }
    });

    // ── Custom cursor ──
    const cursor = document.getElementById('cursor');
    const trail  = document.getElementById('cursorTrail');
    let mx = 0, my = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });

    // Trail follows with slight lag
    let tx = 0, ty = 0;
    (function animTrail() {
      tx += (mx - tx) * 0.12;
      ty += (my - ty) * 0.12;
      trail.style.left = tx + 'px';
      trail.style.top  = ty + 'px';
      requestAnimationFrame(animTrail);
    })();

    // ── Mouse parallax on orbs ──
    const orb1 = document.getElementById('orb1');
    const orb2 = document.getElementById('orb2');

    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      orb1.style.transform = `translate(${dx * -25}px, ${dy * -25}px)`;
      orb2.style.transform = `translate(${dx * 20}px,  ${dy * 20}px)`;
    });

    // ── Card 3D tilt on mouse move ──
    const card   = document.getElementById('card');
    const avatar = document.getElementById('avatar');

    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const rx = ((e.clientY - cy) / cy) * -6;
      const ry = ((e.clientX - cx) / cx) *  6;
      card.style.transform  = `perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg)`;
      // avatar moves slightly opposite for depth
      avatar.style.transform = `translateY(calc(var(--float, 0px))) translate(${-ry * 0.5}px, ${-rx * 0.5}px)`;
    });

    document.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
    });

    // ── Social magnetic hover ──
    document.querySelectorAll('.social').forEach(el => {
      el.addEventListener('mousemove', e => {
        const r   = el.getBoundingClientRect();
        const dx  = e.clientX - (r.left + r.width  / 2);
        const dy  = e.clientY - (r.top  + r.height / 2);
        el.style.transform = `translate(${dx * 0.25}px, ${dy * 0.25}px) scale(1.15)`;
      });
      el.addEventListener('mouseleave', () => {
        el.style.transform = '';
      });
    });

    // ── Auto-cycling social spotlight (one lit at a time) ──
    (function socialSpotlight() {
      const socials = Array.from(document.querySelectorAll('.social'));
      if (!socials.length) return;
      let i = 0, paused = false;

      // pause cycle while user hovers any icon — manual hover wins
      const wrap = document.querySelector('.socials-wrap');
      if (wrap) {
        wrap.addEventListener('mouseenter', () => {
          paused = true;
          socials.forEach(s => s.classList.remove('glow'));
        });
        wrap.addEventListener('mouseleave', () => { paused = false; });
      }

      function step() {
        if (paused) return;
        socials.forEach(s => s.classList.remove('glow'));
        socials[i].classList.add('glow');
        i = (i + 1) % socials.length;
      }

      step();
      setInterval(step, 1300);
    })();

    // ── Blog panel: render, slide-in, spotlight ──
    (function blog() {
      const posts = [
        { tag: 'Founder', teal: true,  read: '6 min', title: 'Why I started Pidiga AI', href: 'blog/why-i-started-pidiga.html' },
        { tag: 'Journey', teal: true,  read: '7 min', title: 'From Java to AI: the journey so far', href: 'blog/the-journey-so-far.html' },
        { tag: 'Engineering', teal: false, read: '8 min', title: 'Zero to MVP: the stack I bet on', href: 'blog/zero-to-mvp-stack.html' },
        { tag: 'AI',  teal: false, read: '6 min', title: 'Be AI-first, be full-stack', href: 'blog/be-ai-first-be-fullstack.html' },
        { tag: 'Career',  teal: false, read: '7 min', title: 'Engineer who did an AGMP (IIMA) — worth it?', href: 'blog/engineer-who-did-an-mba.html' },
      ];

      const list = document.getElementById('blogList');
      const listM = document.getElementById('blogListMobile');
      if (!list) return;

      const itemHTML = (p) =>
        `<div class="blog-meta">` +
          `<span class="blog-tag${p.teal ? ' teal' : ''}">${p.tag}</span>` +
          `<span class="blog-read">${p.read}</span>` +
        `</div>` +
        `<div class="blog-name">${p.title}</div>`;

      posts.forEach((p, idx) => {
        const a = document.createElement('a');
        a.className = 'blog-item';
        a.href = p.href;
        a.innerHTML = itemHTML(p);
        list.appendChild(a);
        // staggered slide-in after the card finishes
        a.style.animationDelay = `${2.35 + idx * 0.12}s`;
        requestAnimationFrame(() => a.classList.add('in'));

        // mirror into mobile drawer
        if (listM) {
          const m = document.createElement('a');
          m.className = 'blog-item in';
          m.href = p.href;
          m.innerHTML = itemHTML(p);
          listM.appendChild(m);
        }
      });

      // ── Drawer open/close ──
      const toggle  = document.getElementById('blogToggle');
      const overlay = document.getElementById('blogOverlay');
      const drawer  = document.getElementById('blogDrawer');
      if (toggle && drawer && overlay) {
        const setOpen = (open) => {
          toggle.classList.toggle('open', open);
          drawer.classList.toggle('open', open);
          overlay.classList.toggle('open', open);
          toggle.setAttribute('aria-expanded', open);
          drawer.setAttribute('aria-hidden', !open);
          toggle.setAttribute('aria-label', open ? 'Close writing' : 'Open writing');
        };
        toggle.addEventListener('click', () => setOpen(!drawer.classList.contains('open')));
        overlay.addEventListener('click', () => setOpen(false));
        document.addEventListener('keydown', e => { if (e.key === 'Escape') setOpen(false); });
        drawer.querySelectorAll('.blog-item').forEach(el => el.addEventListener('click', () => setOpen(false)));
      }

      // auto spotlight — one post lit at a time, pauses on hover
      const items = Array.from(list.children);
      let i = 0, paused = false;
      const panel = document.getElementById('blogPanel');
      panel.addEventListener('mouseenter', () => {
        paused = true;
        items.forEach(x => x.classList.remove('glow'));
      });
      panel.addEventListener('mouseleave', () => { paused = false; });

      function step() {
        if (paused) return;
        items.forEach(x => x.classList.remove('glow'));
        items[i].classList.add('glow');
        i = (i + 1) % items.length;
      }
      // start after entrance animations settle
      setTimeout(() => { step(); setInterval(step, 2200); }, 3200);
    })();
  </script>

</body>
</html>
